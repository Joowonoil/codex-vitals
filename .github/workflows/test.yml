name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift-test:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Run tests
        run: swift test

  windows-test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Windows tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = Join-Path $PWD "windows"
          python -m unittest discover windows\tests
